<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoxelMap</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }
    nav {
      background: #0f172a;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 4px;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      color: #f8fafc;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.3px;
      margin-right: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-brand svg { opacity: 0.9; }
    nav a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    nav a:hover { color: #f8fafc; background: rgba(255,255,255,0.07); }
    nav a.active { color: #a5b4fc; background: rgba(165,180,252,0.1); }
    main { padding: 32px; max-width: 1280px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 700; color: #0f172a; letter-spacing: -0.4px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 8px; font-size: 13.5px;
      font-weight: 600; cursor: pointer; text-decoration: none;
      transition: all 0.15s; border: none;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-ghost { background: transparent; color: #475569; border: 1px solid #e2e8f0; }
    .btn-ghost:hover { background: #f8fafc; color: #1e293b; }
    .btn-danger { background: transparent; color: #ef4444; border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fef2f2; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      </svg>
      VoxelMap
    </div>
    <a href="/">Dashboard</a>
    <a href="/form">+ Add</a>
    <a href="/table">Table</a>
    <a href="/map2d">2D Map</a>
    <a href="/map3d">3D Map</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
